<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOPE — Live Air Traffic</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#0f151e;
    --panel-2:#131b26;
    --line:#1c2733;
    --text:#d7e3ea;
    --text-dim:#5f7387;
    --green:#3ddc84;
    --green-dim:#1f4d38;
    --amber:#ffb020;
    --red:#ff5f5f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono', monospace; overflow:hidden;}
  #app{display:flex; height:100vh; width:100vw; position:relative;}

  /* ---------- TOP BAR ---------- */
  #topbar{
    position:absolute; top:0; left:0; right:0; height:52px; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; background:linear-gradient(180deg, rgba(10,14,20,0.95), rgba(10,14,20,0.75));
    border-bottom:1px solid var(--line); backdrop-filter:blur(4px);
  }
  #brand{display:flex; align-items:center; gap:10px;}
  #brand .dot{width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  #brand h1{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:16px; letter-spacing:3px; color:var(--text);}
  #brand h1 span{color:var(--green);}
  #stats{display:flex; gap:18px; font-size:11px; color:var(--text-dim); letter-spacing:0.5px;}
  #stats b{color:var(--text); font-weight:600;}
  #menuBtn{display:none; background:none; border:1px solid var(--line); color:var(--text); width:34px; height:34px; border-radius:4px; cursor:pointer; font-size:14px;}

  /* ---------- MAP ---------- */
  #map{flex:1; height:100%; filter:saturate(0.9);}
  .leaflet-container{background:var(--bg);}

  /* radar sweep overlay */
  #sweepWrap{position:absolute; inset:0; pointer-events:none; z-index:400; overflow:hidden;}
  #sweep{
    position:absolute; top:50%; left:50%; width:2600px; height:2600px;
    margin:-1300px 0 0 -1300px; border-radius:50%;
    background:conic-gradient(from 0deg, rgba(61,220,132,0.10) 0deg, rgba(61,220,132,0.0) 35deg, transparent 40deg);
    animation:spin 6s linear infinite; transform-origin:center center;
    mix-blend-mode:screen;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:340px; height:100%; background:var(--panel); border-left:1px solid var(--line);
    display:flex; flex-direction:column; z-index:900; flex-shrink:0;
  }
  .side-section{padding:14px 16px; border-bottom:1px solid var(--line);}
  .side-label{font-size:10px; letter-spacing:2px; color:var(--text-dim); margin-bottom:8px; font-family:'Space Grotesk',sans-serif; font-weight:600;}
  #searchInput{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:9px 10px; font-family:'JetBrains Mono', monospace; font-size:12px; border-radius:3px; letter-spacing:1px;
  }
  #searchInput:focus{outline:none; border-color:var(--green);}
  #searchInput::placeholder{color:var(--text-dim);}

  .btn{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim);
    padding:8px 10px; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:1px;
    border-radius:3px; cursor:pointer; transition:all .15s;
  }
  .btn:hover{border-color:var(--green); color:var(--green);}
  .btn.primary{color:var(--green); border-color:var(--green-dim);}
  #controls{display:flex; gap:8px; margin-top:8px;}

  #flightList{flex:1; overflow-y:auto;}
  .flight-row{
    padding:10px 16px; border-bottom:1px solid var(--line); cursor:pointer; font-size:11px;
    display:flex; justify-content:space-between; align-items:center; transition:background .1s;
  }
  .flight-row:hover{background:var(--panel-2);}
  .flight-row.active{background:var(--green-dim); border-left:2px solid var(--green);}
  .flight-row .cs{font-weight:700; color:var(--text); letter-spacing:1px;}
  .flight-row .meta{color:var(--text-dim); font-size:10px; margin-top:2px;}
  .flight-row .alt{color:var(--amber); font-size:11px; font-weight:600;}

  #detail{padding:16px; border-top:1px solid var(--line); background:var(--panel-2); display:none;}
  #detail.show{display:block;}
  #detail .cs-big{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:var(--green); letter-spacing:2px;}
  #detail .country{font-size:11px; color:var(--text-dim); margin-bottom:10px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
  .field{background:var(--panel); border:1px solid var(--line); border-radius:3px; padding:7px 9px;}
  .field .k{font-size:9px; color:var(--text-dim); letter-spacing:1px; margin-bottom:3px;}
  .field .v{font-size:13px; color:var(--text); font-weight:600;}

  #empty{padding:40px 20px; text-align:center; color:var(--text-dim); font-size:11px; line-height:1.7;}

  #loading{
    position:absolute; top:60px; left:16px; z-index:1000; font-size:11px; color:var(--green);
    background:var(--panel); border:1px solid var(--line); padding:6px 12px; border-radius:3px;
    display:none; letter-spacing:1px;
  }
  #loading.show{display:block;}

  #error{
    position:absolute; top:60px; left:16px; right:16px; z-index:1000; font-size:11px; color:var(--red);
    background:var(--panel); border:1px solid var(--red); padding:10px 12px; border-radius:3px;
    display:none; white-space:pre-line; line-height:1.5; max-height:60vh; overflow-y:auto;
  }
  #error.show{display:block;}

  /* plane marker */
  .plane-icon{color:var(--green); filter:drop-shadow(0 0 3px rgba(61,220,132,0.7));}
  .plane-icon.selected{color:var(--amber); filter:drop-shadow(0 0 5px rgba(255,176,32,0.9));}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--panel);}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  @media (max-width:760px){
    #sidebar{position:absolute; right:0; top:52px; bottom:0; transform:translateX(100%); transition:transform .25s; box-shadow:-8px 0 24px rgba(0,0,0,0.4);}
    #sidebar.open{transform:translateX(0);}
    #menuBtn{display:block;}
    #stats{display:none;}
  }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="brand"><div class="dot"></div><h1>SC<span>●</span>PE</h1></div>
    <div id="stats">
      <span>APPAREILS <b id="statCount">—</b></span>
      <span>RAYON <b id="statArea">—</b></span>
      <span>MAJ <b id="statTime">—</b></span>
    </div>
    <button id="menuBtn">☰</button>
  </div>

  <div id="map"></div>
  <div id="sweepWrap"><div id="sweep"></div></div>
  <div id="loading">SYNC EN COURS…</div>
  <div id="error"></div>

  <div id="sidebar">
    <div class="side-section">
      <div class="side-label">RECHERCHE INDICATIF</div>
      <input id="searchInput" placeholder="ex: AFR123, RYR4521…" autocomplete="off" />
      <div id="controls">
        <button class="btn primary" id="refreshBtn">↻ ACTUALISER</button>
        <button class="btn" id="scanBtn">⊕ RAYON MAX (250NM)</button>
      </div>
    </div>

    <div id="flightList"><div id="empty">Chargement des vols en direct…</div></div>

    <div id="detail">
      <div class="cs-big" id="dCallsign">—</div>
      <div class="country" id="dCountry">—</div>
      <div class="grid2">
        <div class="field"><div class="k">ALTITUDE</div><div class="v" id="dAlt">—</div></div>
        <div class="field"><div class="k">VITESSE</div><div class="v" id="dSpeed">—</div></div>
        <div class="field"><div class="k">CAP</div><div class="v" id="dHeading">—</div></div>
        <div class="field"><div class="k">V. VERTICALE</div><div class="v" id="dVrate">—</div></div>
        <div class="field"><div class="k">ICAO24</div><div class="v" id="dIcao">—</div></div>
        <div class="field"><div class="k">AU SOL</div><div class="v" id="dGround">—</div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){
  const map = L.map('map', {zoomControl:false, worldCopyJump:true}).setView([46.8, 8.2], 6);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO — Data: adsb.lol (community ADS-B)',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  const markers = new Map(); // icao24 -> {marker, data}
  let selectedIcao = null;
  let forceMaxRadius = false;
  let lastFetchTime = 0;
  const MIN_INTERVAL = 10000; // be a good citizen of a free, keyless public API

  const planeSVG = (color) => `
    <svg width="22" height="22" viewBox="0 0 24 24" style="transform:rotate(var(--rot,0deg));">
      <path d="M12 1 L14.5 9 L22 12.5 L14.5 14.5 L13.5 22 L12 19.5 L10.5 22 L9.5 14.5 L2 12.5 L9.5 9 Z" fill="${color}"/>
    </svg>`;

  function iconFor(heading, isSelected){
    const color = isSelected ? '#ffb020' : '#3ddc84';
    const html = `<div class="plane-icon${isSelected?' selected':''}" style="--rot:${heading}deg;">${planeSVG(color)}</div>`;
    return L.divIcon({html, className:'', iconSize:[22,22], iconAnchor:[11,11]});
  }

  function fmtAlt(ft){ if(ft==null) return '—'; return Math.round(ft).toLocaleString('fr-CH') + ' ft'; }
  function fmtSpeed(kt){ if(kt==null) return '—'; return Math.round(kt) + ' kt'; }
  function fmtVrate(fpm){ if(fpm==null) return '—'; fpm = Math.round(fpm); return (fpm>0?'+':'')+fpm+' ft/min'; }
  function nmFromLatLng(a, b){ return map.distance(a, b) / 1852; } // meters -> nautical miles

  function setLoading(on){ document.getElementById('loading').classList.toggle('show', on); }
  function setError(msg){
    const el = document.getElementById('error');
    if(!msg){ el.classList.remove('show'); return; }
    el.textContent = msg; el.classList.add('show');
  }

  const PROVIDERS = [
    { name: 'adsb.lol',       urlFor: (lat,lon,r) => `https://api.adsb.lol/v2/lat/${lat}/lon/${lon}/dist/${r}` },
    { name: 'adsb.fi',        urlFor: (lat,lon,r) => `https://opendata.adsb.fi/api/v2/lat/${lat}/lon/${lon}/dist/${r}` },
    { name: 'airplanes.live', urlFor: (lat,lon,r) => `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}` }
  ];
  let activeProviderIdx = 0;

  function currentRadiusNM(){
    if(forceMaxRadius) return 250;
    const c = map.getBounds().getCenter();
    const ne = map.getBounds().getNorthEast();
    const r = Math.ceil(nmFromLatLng(c, ne));
    return Math.min(Math.max(r, 5), 250);
  }

  async function tryProvider(p, lat, lon, radius){
    const url = p.urlFor(lat, lon, radius);
    const res = await fetch(url, { mode: 'cors' });
    if(!res.ok){
      throw new Error(`${p.name} → HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.ac || data.aircraft || [];
  }

  async function fetchStates(force){
    const now = Date.now();
    if(!force && now - lastFetchTime < MIN_INTERVAL - 500){ return; }
    lastFetchTime = now;
    setLoading(true); setError(null);

    const center = map.getCenter();
    const radius = currentRadiusNM();
    const lat = center.lat.toFixed(4), lon = center.lng.toFixed(4);
    document.getElementById('statArea').textContent = radius + ' NM';

    // try the last-known-good provider first, then fall back through the rest
    const order = [activeProviderIdx, ...PROVIDERS.map((_,i)=>i).filter(i => i !== activeProviderIdx)];
    const errors = [];

    for(const idx of order){
      const p = PROVIDERS[idx];
      try{
        const aircraft = await tryProvider(p, lat, lon, radius);
        activeProviderIdx = idx;
        applyStates(aircraft);
        document.getElementById('statTime').textContent = new Date().toLocaleTimeString('fr-CH', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) + ` (${p.name})`;
        setLoading(false);
        return;
      }catch(e){
        // A fetch() TypeError with no further detail almost always means CORS/network block, not a 4xx/5xx
        const reason = e.message && e.message.includes('HTTP') ? e.message : `${p.name} → bloqué (CORS ou réseau) : ${e.message || e}`;
        errors.push(reason);
      }
    }

    setError('Aucun fournisseur accessible depuis ce navigateur :\n' + errors.join('\n') + '\n\nCeci vient très probablement du bac à sable de l\'artifact Claude, pas de ta connexion — les requêtes sortantes vers des API tierces arbitraires n\'y sont pas toujours autorisées.');
    setLoading(false);
  }

  function applyStates(aircraft){
    const seen = new Set();
    let count = 0;
    for(const a of aircraft){
      const icao24 = a.hex;
      if(!icao24 || a.lat==null || a.lon==null) continue;
      const lat = a.lat, lon = a.lon;
      const callsign = (a.flight || '').trim() || icao24.toUpperCase();
      const onGround = a.alt_baro === 'ground';
      const alt = onGround ? 0 : (typeof a.alt_baro === 'number' ? a.alt_baro : (a.alt_geom ?? null));
      const heading = a.track ?? a.true_heading ?? 0;
      const rec = {
        icao24, callsign, reg: a.r || null, type: a.t || null,
        lat, lon, alt, onGround, velocity: a.gs ?? null,
        heading, vrate: a.baro_rate ?? a.geom_rate ?? null
      };
      seen.add(icao24);
      count++;

      if(markers.has(icao24)){
        const m = markers.get(icao24);
        m.marker.setLatLng([lat, lon]);
        m.marker.setIcon(iconFor(heading, icao24===selectedIcao));
        m.data = rec;
      } else {
        const marker = L.marker([lat, lon], {icon: iconFor(heading, icao24===selectedIcao)});
        marker.on('click', () => selectFlight(icao24));
        marker.addTo(map);
        markers.set(icao24, {marker, data: rec});
      }
    }
    // remove stale markers
    for(const [icao24, m] of markers){
      if(!seen.has(icao24)){
        map.removeLayer(m.marker);
        markers.delete(icao24);
        if(selectedIcao === icao24){ selectedIcao = null; document.getElementById('detail').classList.remove('show'); }
      }
    }
    document.getElementById('statCount').textContent = count.toLocaleString('fr-CH');
    renderList();
  }

  function renderList(){
    const q = document.getElementById('searchInput').value.trim().toUpperCase();
    const listEl = document.getElementById('flightList');
    let items = Array.from(markers.values()).map(m => m.data);
    if(q){ items = items.filter(d => d.callsign.toUpperCase().includes(q) || d.icao24.toUpperCase().includes(q)); }
    items.sort((a,b) => (b.alt||0) - (a.alt||0));
    items = items.slice(0, 150);

    if(items.length === 0){
      listEl.innerHTML = '<div id="empty">Aucun vol dans ce rayon.<br>Déplace la carte ou essaie « RAYON MAX ».</div>';
      return;
    }
    listEl.innerHTML = items.map(d => `
      <div class="flight-row ${d.icao24===selectedIcao?'active':''}" data-icao="${d.icao24}">
        <div>
          <div class="cs">${d.callsign}</div>
          <div class="meta">${[d.type, d.reg].filter(Boolean).join(' · ') || '—'}</div>
        </div>
        <div class="alt">${d.onGround ? 'SOL' : fmtAlt(d.alt)}</div>
      </div>
    `).join('');
    listEl.querySelectorAll('.flight-row').forEach(row => {
      row.addEventListener('click', () => selectFlight(row.dataset.icao));
    });
  }

  function selectFlight(icao24){
    const prevSelected = selectedIcao;
    selectedIcao = icao24;
    const rec = markers.get(icao24);
    if(!rec) return;

    // refresh icons for old + new selection
    if(prevSelected && markers.has(prevSelected)){
      const p = markers.get(prevSelected);
      p.marker.setIcon(iconFor(p.data.heading, false));
    }
    rec.marker.setIcon(iconFor(rec.data.heading, true));

    map.panTo([rec.data.lat, rec.data.lon]);

    const d = rec.data;
    document.getElementById('detail').classList.add('show');
    document.getElementById('dCallsign').textContent = d.callsign;
    document.getElementById('dCountry').textContent = [d.type, d.reg].filter(Boolean).join(' · ') || 'Type/immat. inconnus';
    document.getElementById('dAlt').textContent = d.onGround ? 'Au sol' : fmtAlt(d.alt);
    document.getElementById('dSpeed').textContent = fmtSpeed(d.velocity);
    document.getElementById('dHeading').textContent = Math.round(d.heading) + '°';
    document.getElementById('dVrate').textContent = fmtVrate(d.vrate);
    document.getElementById('dIcao').textContent = d.icao24.toUpperCase();
    document.getElementById('dGround').textContent = d.onGround ? 'OUI' : 'NON';

    renderList();
    if(window.innerWidth <= 760){ document.getElementById('sidebar').classList.remove('open'); }
  }

  document.getElementById('searchInput').addEventListener('input', renderList);
  document.getElementById('refreshBtn').addEventListener('click', () => fetchStates(true));
  document.getElementById('scanBtn').addEventListener('click', () => {
    forceMaxRadius = !forceMaxRadius;
    document.getElementById('scanBtn').classList.toggle('primary', forceMaxRadius);
    fetchStates(true);
  });
  map.on('moveend', () => fetchStates(false));
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  fetchStates(true);
  setInterval(() => fetchStates(false), MIN_INTERVAL);
})();
</script>
</body>
</html>
